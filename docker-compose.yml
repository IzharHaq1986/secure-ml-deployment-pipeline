services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: secure-ml-api

    ports:
    # Map the configurable host port to the container port used by FastAPI.
      - "${APP_PORT:-8000}:8000"

    # Keep the filesystem read-only for safer runtime behavior.
    read_only: true

    # Provide a writable temporary filesystem for application needs.
    tmpfs:
      - /tmp

    # Prevent privilege escalation inside the container.
    security_opt:
      - no-new-privileges:true

    # Add lightweight runtime guardrails for local and CI deployment tests.
    cpus: "${APP_CPUS:-1.00}"
    mem_limit: "${APP_MEMORY_LIMIT:-512m}"
    pids_limit: 100

    # Health check validates that the API is responding inside the container.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
