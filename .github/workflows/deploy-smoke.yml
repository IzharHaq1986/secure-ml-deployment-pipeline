name: Docker Compose deployment smoke test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build application image for deployment smoke test
        run: |
          # Build the local application image used by Docker Compose.
          # Keeping the tag explicit makes workflow output easier to read.
          docker build \
            --tag secure-ml-deployment-pipeline:ci \
            .

      - name: Start Docker Compose deployment
        run: |
          # Start the Compose stack in detached mode using the CI-specific
          # environment template for deterministic runner behavior.
          docker compose \
            --env-file .env.ci.example \
            -f docker-compose.yml \
            up -d

      - name: Wait for application startup
        run: |
          # Give the container a short startup window before health validation.
          # This keeps the smoke test simple and deterministic.
          sleep 20

      - name: Validate deployed health endpoint
        run: |
          # Retry the health check to account for variable startup timing in CI.
          # This keeps the smoke test stable without changing application logic.
          for i in {1..10}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
              echo "Service is ready"
              exit 0
            fi

            echo "Waiting for service to become ready..."
            sleep 3
          done

          echo "Service failed to become ready in time"
          exit 1

      - name: Show container status on failure
        if: failure()
        run: |
          # Print container state only when the workflow fails.
          docker compose \
            --env-file .env.ci.example \
            -f docker-compose.yml \
            ps

      - name: Show container logs on failure
        if: failure()
        run: |
          # Print service logs only when the workflow fails.
          # This preserves concise output for successful runs.
          docker compose \
            --env-file .env.ci.example \
            -f docker-compose.yml \
            logs --no-color

      - name: Tear down deployment
        if: always()
        run: |
          # Stop and remove the Compose stack even if a prior step fails.
          # Volumes are removed to keep the runner clean between executions.
          docker compose \
            --env-file .env.ci.example \
            -f docker-compose.yml \
            down -v
